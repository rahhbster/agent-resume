name: Release

# Publishes @agent-resume/schemas to npm with build provenance.
#
# Trigger options:
#   - Push a tag like `v1.0.0`  -> builds, tests, and publishes.
#   - Run manually (workflow_dispatch) with dry_run=true to pack only.
#
# Requires a repository secret `NPM_TOKEN` (an npm automation token with
# publish rights to the @agent-resume scope). Provenance needs id-token: write.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack and verify only — do not publish"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Build, test & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @agent-resume/schemas build

      - name: Test
        run: pnpm --filter @agent-resume/schemas test

      - name: Verify tarball contents
        working-directory: packages/schemas
        run: npm pack --dry-run

      - name: Publish to npm (with provenance)
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        working-directory: packages/schemas
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
